<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mini App de Clima</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Mini App de Clima</h1>
        <form class="search-area">
            <input type="text" id="input-area" placeholder="Digite o nome da cidade" name="cidade" required>
            <button type="submit" id="botao-buscar">Buscar</button>
        </form>
        <ul id="sugestoes" class="lista-sugestoes"></ul>

        <div id="clima-info" class="clima-info">
            <h2 id="cidade-nome"></h2>
            <p id="temperatura"></p>
            <p id="vento"></p>
        </div>
    </div>

    <script src="script.js"></script>
    
</body>
</html>
